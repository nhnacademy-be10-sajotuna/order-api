spring:
  application:
    name: order-api
  datasource:
    url: jdbc:mysql://s4.java21.net:13306/project_be10_team4_order?serverTimezone=Asia/Seoul
    username: project_be10_team4
    password: uEUklnkbk*7*_O4H
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: ${PORT:10366}

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:10372/eureka/
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health,info,shutdown